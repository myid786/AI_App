services:
  mysql:
    image: mysql:8.0
    container_name: aimedia-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: aimedia-redis
    ports:
      - "6379:6379"

  discovery-service:
    build:
      context: .
      dockerfile: discovery-service/Dockerfile
    container_name: discovery-service
    ports:
      - "8761:8761"

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    environment:
      DB_URL: jdbc:mysql://mysql:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: root
      EUREKA_URL: http://discovery-service:8761/eureka
      JWT_SECRET: change-this-secret-in-azure-at-least-32-chars
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_started

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    environment:
      DB_URL: jdbc:mysql://mysql:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: root
      EUREKA_URL: http://discovery-service:8761/eureka
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_started

  post-service:
    build:
      context: .
      dockerfile: post-service/Dockerfile
    container_name: post-service
    environment:
      DB_URL: jdbc:mysql://mysql:3306/post_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EUREKA_URL: http://discovery-service:8761/eureka
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      discovery-service:
        condition: service_started

  interaction-service:
    build:
      context: .
      dockerfile: interaction-service/Dockerfile
    container_name: interaction-service
    environment:
      DB_URL: jdbc:mysql://mysql:3306/interaction_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: root
      EUREKA_URL: http://discovery-service:8761/eureka
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_started

  media-service:
    build:
      context: .
      dockerfile: media-service/Dockerfile
    container_name: media-service
    environment:
      EUREKA_URL: http://discovery-service:8761/eureka
      UPLOAD_DIR: /app/uploads
      MEDIA_BASE_URL: http://localhost:8085/uploads
    ports:
      - "8085:8085"
    volumes:
      - media_uploads:/app/uploads
    depends_on:
      discovery-service:
        condition: service_started

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: ai-service
    environment:
      EUREKA_URL: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_started

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_URL: http://discovery-service:8761/eureka
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      discovery-service:
        condition: service_started
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      post-service:
        condition: service_started
      interaction-service:
        condition: service_started
      media-service:
        condition: service_started
      ai-service:
        condition: service_started

volumes:
  mysql_data:
  media_uploads:
